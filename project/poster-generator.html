<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster Generator</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #efede7;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
      max-height: 100vh;
      width: auto !important;
      height: 100vh !important;
    }

    .ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(0, 0, 0, 0.14);
      background: rgba(255, 255, 255, 0.9);
      color: #222;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: white;
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>

<body>
  <div class="ui">
    <button id="generateBtn">generate poster</button>
    <button id="saveBtn">save png</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <script>
    const POSTER_W = 1240;
    const POSTER_H = 1754;

    const MARGIN_X = POSTER_W * (24 / 210);
    const MARGIN_Y = POSTER_H * (24 / 297);

    const COLS = 6;
    const ROWS = 8;

    const WORK_W = POSTER_W - MARGIN_X * 2;
    const WORK_H = POSTER_H - MARGIN_Y * 2;

    const COL_W = WORK_W / COLS;
    const ROW_H = WORK_H / ROWS;
    const TEXT_IMAGE_GAP = ROW_H * 0.18;

    let buildings = [];
    let currentBuilding = null;
    let currentLayout = null;

    const posterContent = {
      title: "THE CITY THAT REMEMBERS FORWARD",
      textIntro: "A generative exhibition about imaginary buildings, future nostalgia, urban rhythm, and the emotional memory of cities that do not exist yet.",
      textPoem: "Windows repeat like thoughts.\nDoors appear like invitations.\nStreets rearrange themselves before they can be remembered.",
      dateAddress: "38.07.2026, 19:30\nOpening Night\n\nThe Museum of Unbuilt Streets\n42 Soft Corner Lane\nOld Future District\n00023 City City\n\n38.07.2026, 38.13.2026",
      extraInfo: "Generated houses\nRandom streets\nPoster machines\nSaved facades\nA sandbox for slow exploration",
      extraInfo2: "Free entry",
    };

    function setup() {
      createCanvas(POSTER_W, POSTER_H);
      pixelDensity(1);
      imageMode(CORNER);
      textFont("Arial");

      document.getElementById("generateBtn").addEventListener("click", generatePoster);

      document.getElementById("saveBtn").addEventListener("click", () => {
        saveCanvas("generated_poster", "png");
      });

      loadBuildingList();
    }

    function draw() {
      drawPoster();
    }

    async function loadBuildingList() {
      try {
        const response = await fetch("/api/buildings");
        buildings = await response.json();

        if (!buildings.length) {
          console.warn("No generated buildings found.");
          return;
        }

        generatePoster();
      } catch (error) {
        console.error("Could not load buildings:", error);
      }
    }

    function generatePoster() {
      if (!buildings.length) {
        alert("No building PNGs found. Save some buildings first.");
        return;
      }

      const buildingData = pick(buildings);

      loadImage(buildingData.path, (img) => {
        currentBuilding = img;
        currentLayout = createLayout();
      });
    }

    function createLayout() {
      const archetype = floor(random(1, 7));
      const showExtraInfo = random() < 0.68;
      const showExtraInfo2 = random() < 0.5;

      let layout;

      if (archetype === 1) {
        layout = {
          archetype,
          title: titleBlock(0, 0, 6, 2.15, 112),
          image: rectFromGrid(2.4, 4.55, 3.6, 2.05),
          textBlocks: [
            textBlock(0, 2.65, 2.55, 1.45, posterContent.textIntro, 18, 25),
            textBlock(3.15, 2.65, 2.35, 1.45, posterContent.textPoem, 17, 24),
          ],
          date: textBlock(0, 6.25, 1.9, 1.15, posterContent.dateAddress, 12, 16),
          extras: [
            optionalBlock(showExtraInfo, 4.5, 6.9, 1.35, 0.75, posterContent.extraInfo, 11, 15),
            optionalBlock(showExtraInfo2, 0, 7.55, 1.2, 0.25, posterContent.extraInfo2, 12, 14),
          ],
        };
      }

      if (archetype === 2) {
        layout = {
          archetype,
          title: titleBlock(0, 2.55, 5.75, 2.2, 124),
          image: rectFromGrid(3.15, 0.1, 2.85, 1.85),
          textBlocks: [
            textBlock(0, 5.15, 2.4, 1.15, posterContent.textIntro, 17, 24),
            textBlock(0, 6.35, 2.4, 1.1, posterContent.textPoem, 17, 24),
          ],
          date: textBlock(3.25, 5.35, 1.75, 1.25, posterContent.dateAddress, 12, 16),
          extras: [
            optionalBlock(showExtraInfo, 4.85, 6.75, 1.15, 0.8, posterContent.extraInfo, 11, 15),
            optionalBlock(showExtraInfo2, 3.25, 7.45, 1.2, 0.25, posterContent.extraInfo2, 12, 14),
          ],
        };
      }

      if (archetype === 3) {
        layout = {
          archetype,
          title: titleBlock(0, 0, 6, 3, 142),
          image: rectFromGrid(0.6, 4.25, 4.8, 1.85),
          textBlocks: [
            textBlock(0, 3.35, 2.55, 0.8, posterContent.textIntro, 15, 21),
            textBlock(3.2, 3.35, 2.35, 0.8, posterContent.textPoem, 15, 21),
          ],
          date: textBlock(0, 6.55, 1.95, 1.05, posterContent.dateAddress, 12, 16),
          extras: [
            optionalBlock(showExtraInfo, 3.2, 6.55, 1.45, 1.05, posterContent.extraInfo, 11, 15),
            optionalBlock(showExtraInfo2, 4.85, 6.55, 0.9, 0.25, posterContent.extraInfo2, 12, 14),
          ],
        };
      }

      if (archetype === 4) {
        layout = {
          archetype,
          title: titleBlock(0.25, 0.6, 5.5, 3.05, 150),
          image: rectFromGrid(3.15, 5.1, 2.65, 1.9),
          textBlocks: [
            textBlock(0.25, 4.15, 2.25, 1.1, posterContent.textIntro, 17, 24),
            textBlock(0.25, 5.45, 2.25, 1.1, posterContent.textPoem, 17, 24),
          ],
          date: textBlock(3.15, 3.85, 1.75, 1.05, posterContent.dateAddress, 12, 16),
          extras: [
            optionalBlock(showExtraInfo, 4.95, 3.85, 0.95, 1.05, posterContent.extraInfo, 10, 14),
            optionalBlock(showExtraInfo2, 3.15, 7.25, 1.1, 0.25, posterContent.extraInfo2, 12, 14),
          ],
        };
      }

      if (archetype === 5) {
        layout = {
          archetype,
          title: titleBlock(0, 0.4, 3.25, 2.55, 106),
          image: rectFromGrid(3.25, 2.85, 2.75, 3.35),
          textBlocks: [
            textBlock(0, 3.35, 2.45, 1.25, posterContent.textIntro, 17, 24),
            textBlock(0, 4.85, 2.45, 1.15, posterContent.textPoem, 17, 24),
          ],
          date: textBlock(0, 6.55, 1.95, 1.15, posterContent.dateAddress, 12, 16),
          extras: [
            optionalBlock(showExtraInfo, 3.25, 6.65, 1.35, 0.85, posterContent.extraInfo, 11, 15),
            optionalBlock(showExtraInfo2, 4.8, 6.65, 0.9, 0.25, posterContent.extraInfo2, 12, 14),
          ],
        };
      }

      if (archetype === 6) {
        layout = {
          archetype,
          title: titleBlock(0, 0, 6, 2.65, 132),
          image: rectFromGrid(1.1, 5.25, 4.8, 1.9),
          textBlocks: [
            textBlock(0, 3.25, 2.55, 1.15, posterContent.textIntro, 17, 24),
            textBlock(3, 3.25, 2.55, 1.15, posterContent.textPoem, 17, 24),
          ],
          date: textBlock(0, 6.6, 1.85, 1.05, posterContent.dateAddress, 12, 16),
          extras: [
            optionalBlock(showExtraInfo, 2.4, 6.65, 1.35, 0.85, posterContent.extraInfo, 11, 15),
            optionalBlock(showExtraInfo2, 4.4, 6.65, 1, 0.25, posterContent.extraInfo2, 12, 14),
          ],
        };
      }

      layout.titleText = posterContent.title;
      layout.date.kind = "light";
      layout.extras = layout.extras.filter(Boolean).map((block) => ({
        ...block,
        kind: "extra",
      }));

      return layout;
    }

    function drawPoster() {
      background("#f4f1ea");

      if (!currentLayout || !currentBuilding) {
        fill("#111111");
        noStroke();
        textSize(20);
        textAlign(LEFT, TOP);
        text("Save buildings first, then generate poster.", MARGIN_X, MARGIN_Y);
        return;
      }

      const imageRect = getImageFitRect(currentBuilding, currentLayout.image);
      const posterTextBlocks = avoidImageOverlap(
        [
          ...currentLayout.textBlocks,
          currentLayout.date,
          ...currentLayout.extras,
        ],
        imageRect
      );

      drawTitle(currentLayout.title, currentLayout.titleText);
      drawImageBlock(currentBuilding, currentLayout.image);
      posterTextBlocks.forEach((block) => {
        if (block.kind === "light") {
          drawLightText(block);
        } else if (block.kind === "extra") {
          drawExtraText(block);
        } else {
          drawBodyText(block);
        }
      });

      // Uncomment for grid debug:
      // drawGrid();
    }

    function drawImageBlock(img, r) {
      if (!img) return;

      const imageRect = getImageFitRect(img, r);

      image(
        img,
        imageRect.x,
        imageRect.y,
        imageRect.w,
        imageRect.h
      );
    }

    function getImageFitRect(img, r) {
      const scale = min(r.w / img.width, r.h / img.height);
      const drawW = img.width * scale;
      const drawH = img.height * scale;
      const x = r.x + (r.w - drawW) / 2;
      const y = r.y + (r.h - drawH) / 2;

      return {
        x,
        y,
        w: drawW,
        h: drawH
      };
    }

    function drawTitle(block, title) {
      fill("#111111");
      noStroke();

      const r = block.rect;
      const titleText = title.toUpperCase();
      const fontSize = fitTitleSize(titleText, r, block.size);
      const leading = fontSize * 0.82;
      const lines = wrapTextLines(titleText, r.w, fontSize);

      textFont("Arial Black");
      textSize(fontSize);
      textLeading(leading);
      textStyle(BOLD);
      textAlign(LEFT, TOP);

      lines.forEach((line, index) => {
        text(line, r.x, r.y + index * leading);
      });

      textStyle(NORMAL);
      textFont("Arial");
    }

    function drawBodyText(block) {
      const r = block.rect;

      fill("#111111");
      noStroke();

      textFont("Arial");
      textSize(block.size);
      textLeading(block.leading);
      textStyle(NORMAL);
      textAlign(LEFT, TOP);

      text(block.text, r.x, r.y, r.w, r.h);
    }

    function drawLightText(block) {
      const r = block.rect;

      fill(17, 17, 17, 150);
      noStroke();
      textFont("Arial");
      textSize(block.size);
      textLeading(block.leading);
      textStyle(NORMAL);
      textAlign(LEFT, TOP);

      text(block.text, r.x, r.y, r.w, r.h);
    }

    function drawExtraText(block) {
      const r = block.rect;

      fill("#111111");
      noStroke();
      textFont("Arial");
      textSize(block.size);
      textLeading(block.leading);
      textStyle(NORMAL);
      textAlign(LEFT, TOP);

      text(block.text, r.x, r.y, r.w, r.h);
    }

    function fitTitleSize(title, r, preferredSize) {
      for (let size = preferredSize; size >= 52; size -= 2) {
        const lines = wrapTextLines(title, r.w, size);
        const leading = size * 0.82;
        const textHeight = lines.length * leading;

        if (textHeight <= r.h && lines.every((line) => textWidth(line) <= r.w)) {
          return size;
        }
      }

      return 52;
    }

    function wrapTextLines(textValue, maxWidth, size) {
      textFont("Arial Black");
      textSize(size);

      const words = textValue.split(" ");
      const lines = [];
      let currentLine = "";

      for (let word of words) {
        const testLine = currentLine ? `${currentLine} ${word}` : word;

        if (textWidth(testLine) <= maxWidth || !currentLine) {
          currentLine = testLine;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      }

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines;
    }

    function titleBlock(col, row, colSpan, rowSpan, size) {
      return {
        rect: rectFromGrid(col, row, colSpan, rowSpan),
        size,
      };
    }

    function textBlock(col, row, colSpan, rowSpan, textValue, size, leading) {
      return {
        rect: rectFromGrid(col, row, colSpan, rowSpan),
        text: textValue,
        size,
        leading,
      };
    }

    function avoidImageOverlap(blocks, imageRect) {
      let nextY = imageRect.y + imageRect.h + TEXT_IMAGE_GAP;

      return blocks.map((block) => {
        const movedBlock = copyTextBlock(block);

        if (rectsOverlap(expandRect(movedBlock.rect, 10), imageRect)) {
          const maxY = MARGIN_Y + WORK_H - movedBlock.rect.h;
          movedBlock.rect.y = min(nextY, maxY);
          nextY = movedBlock.rect.y + movedBlock.rect.h + TEXT_IMAGE_GAP * 0.5;
        }

        return movedBlock;
      });
    }

    function copyTextBlock(block) {
      return {
        ...block,
        rect: { ...block.rect },
      };
    }

    function expandRect(r, amount) {
      return {
        x: r.x - amount,
        y: r.y - amount,
        w: r.w + amount * 2,
        h: r.h + amount * 2,
      };
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function optionalBlock(show, col, row, colSpan, rowSpan, textValue, size, leading) {
      if (!show) return null;
      return textBlock(col, row, colSpan, rowSpan, textValue, size, leading);
    }

    function rectFromGrid(col, row, colSpan, rowSpan) {
      return {
        x: MARGIN_X + col * COL_W,
        y: MARGIN_Y + row * ROW_H,
        w: colSpan * COL_W,
        h: rowSpan * ROW_H
      };
    }

    function drawGrid() {
      stroke(255, 0, 0, 60);
      noFill();

      for (let c = 0; c <= COLS; c++) {
        const x = MARGIN_X + c * COL_W;
        line(x, MARGIN_Y, x, MARGIN_Y + WORK_H);
      }

      for (let r = 0; r <= ROWS; r++) {
        const y = MARGIN_Y + r * ROW_H;
        line(MARGIN_X, y, MARGIN_X + WORK_W, y);
      }
    }

    function pick(arr) {
      return arr[floor(random(arr.length))];
    }
  </script>
  <script src="shared-nav.js"></script>
</body>
</html>
