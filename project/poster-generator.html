<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster Generator</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #efede7;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: 0 auto;
      max-height: 100vh;
      width: auto !important;
      height: 100vh !important;
    }

    body[data-format="ticket"] {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body[data-format="ticket"] canvas {
      max-width: calc(100vw - 96px);
      max-height: calc(100vh - 140px);
      width: min(1040px, calc(100vw - 96px)) !important;
      height: auto !important;
    }

    @media (max-width: 760px) {
      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 108px 12px 12px;
      }

      canvas {
        width: min(calc(100vw - 24px), calc((100dvh - 120px) * 1240 / 1754)) !important;
        height: auto !important;
        max-width: calc(100vw - 24px);
        max-height: calc(100dvh - 120px);
      }

      body[data-format="ticket"] {
        min-height: 100dvh;
        padding: 108px 12px 12px;
      }

      body[data-format="ticket"] canvas {
        width: calc(100vw - 24px) !important;
        max-width: calc(100vw - 24px);
        max-height: calc(100dvh - 120px);
      }
    }

  </style>
  <link rel="stylesheet" href="generator-toolbar.css">
  <link rel="stylesheet" href="shared-nav.css">
</head>

<body>

  <script>
    const POSTER_W = 1240;
    const POSTER_H = 1754;
    const POST_W = 1080;
    const POST_H = 1350;
    const TICKET_W = 1600;
    const TICKET_H = 520;

    const MARGIN_X = POSTER_W * (24 / 210);
    const MARGIN_Y = POSTER_H * (24 / 297);
    const TICKET_MARGIN_X = 64;
    const TICKET_MARGIN_Y = 48;
    const TICKET_WORK_W = TICKET_W - TICKET_MARGIN_X * 2;
    const TICKET_WORK_H = TICKET_H - TICKET_MARGIN_Y * 2;
    const TICKET_ZONE_GAP = 34;
    const TICKET_TITLE_ZONE_W = 470;
    const TICKET_IMAGE_ZONE_W = 520;
    const TICKET_INFO_ZONE_W = TICKET_WORK_W - TICKET_TITLE_ZONE_W - TICKET_IMAGE_ZONE_W - TICKET_ZONE_GAP * 2;
    const TICKET_TITLE_ZONE = {
      x: TICKET_MARGIN_X,
      y: TICKET_MARGIN_Y,
      w: TICKET_TITLE_ZONE_W,
      h: TICKET_WORK_H,
    };
    const TICKET_IMAGE_ZONE = {
      x: TICKET_TITLE_ZONE.x + TICKET_TITLE_ZONE.w + TICKET_ZONE_GAP,
      y: TICKET_MARGIN_Y,
      w: TICKET_IMAGE_ZONE_W,
      h: TICKET_WORK_H,
    };
    const TICKET_INFO_ZONE = {
      x: TICKET_IMAGE_ZONE.x + TICKET_IMAGE_ZONE.w + TICKET_ZONE_GAP,
      y: TICKET_MARGIN_Y,
      w: TICKET_INFO_ZONE_W,
      h: TICKET_WORK_H,
    };
    const TICKET_MAIN_ZONE = {
      x: TICKET_TITLE_ZONE.x,
      y: TICKET_MARGIN_Y,
      w: TICKET_TITLE_ZONE.w + TICKET_IMAGE_ZONE.w + TICKET_ZONE_GAP,
      h: TICKET_WORK_H,
    };
    const TICKET_PERFORATION_X = TICKET_INFO_ZONE.x - TICKET_ZONE_GAP * 0.5;

    const COLS = 6;
    const ROWS = 8;

    const WORK_W = POSTER_W - MARGIN_X * 2;
    const WORK_H = POSTER_H - MARGIN_Y * 2;

    const COL_W = WORK_W / COLS;
    const ROW_H = WORK_H / ROWS;
    const TEXT_IMAGE_GAP = ROW_H * 0.18;
    const THEME_LABELS = {
      originalNeutral: "Neutral",
      mutedBlue: "Blue",
      monochrome: "B/W",
    };

    let buildings = [];
    let fallbackImageFiles = [];
    let currentBuilding = null;
    let currentLayout = null;
    let silhouetteCache = null;
    let silhouetteCacheSource = null;
    let silhouetteCacheColor = null;
    const posterPaletteApi = createPosterPaletteApi();
    let paletteAssignments = {};
    let activePaletteId = posterPaletteApi.defaultPaletteId;
    let paletteAssignment = getPaletteAssignment(activePaletteId);
    let textUi = {};
    let activeMode = "poster";
    let postImage = null;
    let postLayout = null;
    let postImageType = "building";
    let ticketBuilding = null;
    let ticketBuildingIsFallback = false;
    let ticketLayout = null;
    let ticketQrImage = null;
    let ticketQrTintedImage = null;
    let ticketQrTintColor = null;

    const posterContent = {
      title: "RE;ASSEMBLY;",
      subtitle: "generative city builder",
      textIntro: "Every building is made from a limited archive of façades, windows, doors, roofs and decorative elements. Visitors define conditions such as size, density, repetition, lighting and decoration, but they do not position every element themselves.",
      textPoem: "The system assembles the result through a fixed grid, architectural rules and chance. When a result is shaped by the visitor, the system and randomness at the same time, who is actually creating it?",
      dateAddress: "38.07.2026, 19:30\nOpening Night\n\nThe Museum of Unbuilt Streets\n42 Soft Corner Lane\nOld Future District\n00023 City City\n\n38.07.2026, 38.13.2026",
      extraInfo: "Generated houses\nRandom streets\nPoster machines\nSaved facades\nA sandbox for slow exploration",
      extraInfo2: "Free entry",
    };

    const postContent = {
      headline: "Imaginary City Archive",
      subtitle: "Fragments of streets that never existed.",
      metadata: "ARCHIVE NO. 001\n2026\nGENERATED CITY FRAGMENT",
    };

    const ticketContent = {
      title: "RE;ASSEMBLY;\ncity generator",
      date: "20 JULY 2026",
      time: "19:30",
      location: "Faculty for Design\nMunich University of Applied Sciences\nLothstraße 17\n80335 Munich",
      number: "CTRF-00038",
      note: "Generated access / unbuilt streets / memory-forward archive",
    };

    const postHeadlineOptions = [
      "Imaginary City Archive",
      "Future Nostalgia",
      "Generated Memory",
      "Soft Urban Fragments",
      "The City Remembers",
    ];
    const postSubtitleOptions = [
      "A fictional archive of generated places.",
      "Fragments of streets that never existed.",
      "Memory, architecture, and procedural imagination.",
      "A city built from rhythm, texture, and chance.",
      "An exhibition about places between memory and fiction.",
    ];
    const postMetadataOptions = [
      "ARCHIVE NO. 001\n2026\nGENERATED FACADE STUDY",
      "ARCHIVE NO. 024\nGENERATED CITY FRAGMENT\nDENSITY / MEMORY / VARIATION",
      "2026\nSTREET FRAGMENT / SYSTEM OUTPUT",
      "MEMORY DENSITY: HIGH\nVARIATION: RANDOM",
      "GENERATED FACADE STUDY\nSOFT URBAN FRAGMENTS",
    ];

    function createPosterPaletteApi() {
      if (
        typeof COLOR_PALETTES !== "undefined" &&
        typeof DEFAULT_PALETTE_ID !== "undefined" &&
        typeof createPaletteAssignment === "function" &&
        typeof hexToRgb === "function"
      ) {
        return {
          colorPalettes: COLOR_PALETTES,
          defaultPaletteId: DEFAULT_PALETTE_ID,
          createPaletteAssignment,
          hexToRgb,
        };
      }

      const fallbackPalettes = {
        originalNeutral: {
          name: "Original / Neutral",
          colors: ["#1C1C1C", "#F1EEE8", "#E7E0D3"],
        },
        mutedBlue: {
          name: "Muted Blue",
          colors: ["#AFC6D8", "#C7D6E2", "#E8E5DE"],
        },
        monochrome: {
          name: "Monochrome",
          colors: ["#000000", "#FFFFFF"],
        },
      };

      return {
        colorPalettes: fallbackPalettes,
        defaultPaletteId: "originalNeutral",
        createPaletteAssignment(paletteId) {
          const palette = fallbackPalettes[paletteId] || fallbackPalettes.originalNeutral;
          const background = palette.colors[1];
          const textColor = palette.colors[0];

          return {
            id: palette === fallbackPalettes[paletteId] ? paletteId : "originalNeutral",
            pageBackground: background,
            headline: textColor,
            bodyText: textColor,
            secondaryText: textColor,
            illustration: textColor,
            illustrationAlt: textColor,
            accent: textColor,
            text: textColor,
          };
        },
        hexToRgb(hexColor) {
          const hex = hexColor.replace("#", "");
          return [
            parseInt(hex.slice(0, 2), 16),
            parseInt(hex.slice(2, 4), 16),
            parseInt(hex.slice(4, 6), 16),
          ];
        },
      };
    }

    function setup() {
      createCanvas(POSTER_W, POSTER_H);
      pixelDensity(1);
      imageMode(CORNER);
      textFont("Arial");

      document.getElementById("generateBtn").addEventListener("click", generateActiveFormat);
      setupTextControls();
      setupPaletteControls();
      setupModeControls();

      loadImage(
        "assets/qr/ticket-qr.png",
        (img) => {
          ticketQrImage = img;
          ticketQrTintedImage = null;
          ticketQrTintColor = null;
        },
        (error) => {
          console.warn("Could not load ticket QR code:", error);
        }
      );

      document.getElementById("saveBtn").addEventListener("click", () => {
        saveActiveFormat();
      });

      loadFallbackImageList();
      loadBuildingList();
    }

    async function loadFallbackImageList() {
      try {
        const response = await fetch("/api/fallback-images");

        if (!response.ok) {
          throw new Error("Could not load fallback image list");
        }

        fallbackImageFiles = await response.json();
      } catch (error) {
        console.warn("Could not load fallback images, using drawn placeholder instead:", error);
        fallbackImageFiles = [];
      }
    }

    function setupTextControls() {
      textUi = {
        textBtn: document.getElementById("textBtn"),
        textPopover: document.getElementById("textPopover"),
        titleInput: document.getElementById("titleInput"),
        subtitleInput: document.getElementById("subtitleInput"),
        introInput: document.getElementById("introInput"),
        poemInput: document.getElementById("poemInput"),
        dateInput: document.getElementById("dateInput"),
        extraInput: document.getElementById("extraInput"),
        extra2Input: document.getElementById("extra2Input"),
        ticketTitleInput: document.getElementById("ticketTitleInput"),
        ticketDateInput: document.getElementById("ticketDateInput"),
        ticketTimeInput: document.getElementById("ticketTimeInput"),
        ticketLocationInput: document.getElementById("ticketLocationInput"),
        ticketNumberInput: document.getElementById("ticketNumberInput"),
        ticketNoteInput: document.getElementById("ticketNoteInput"),
        posterTextFields: document.getElementById("posterTextFields"),
        ticketTextFields: document.getElementById("ticketTextFields"),
      };

      syncPosterTextInputs();
      syncTicketTextInputs();
      textUi.textBtn.addEventListener("click", toggleTextPopover);
      [
        textUi.titleInput,
        textUi.subtitleInput,
        textUi.introInput,
        textUi.poemInput,
        textUi.dateInput,
        textUi.extraInput,
        textUi.extra2Input,
      ].forEach((input) => {
        input.addEventListener("input", updatePosterContentFromInputs);
      });
      [
        textUi.ticketTitleInput,
        textUi.ticketDateInput,
        textUi.ticketTimeInput,
        textUi.ticketLocationInput,
        textUi.ticketNumberInput,
        textUi.ticketNoteInput,
      ].forEach((input) => {
        input.addEventListener("input", updateTicketContentFromInputs);
      });

      document.addEventListener("click", closeTextPopoverOnOutsideClick);
      document.addEventListener("keydown", closeTextPopoverOnEscape);
    }

    function setupModeControls() {
      const posterModeBtn = document.getElementById("posterModeBtn");
      const ticketModeBtn = document.getElementById("ticketModeBtn");

      posterModeBtn.addEventListener("click", () => activateMode("poster"));
      ticketModeBtn.addEventListener("click", () => activateMode("ticket"));
      updateModeControls();
    }

    function activateMode(mode) {
      if (activeMode === mode) return;

      activeMode = mode;
      closeTextPopover();
      updateModeControls();

      if (activeMode === "poster") {
        resizeCanvas(POSTER_W, POSTER_H);
        if (!currentLayout || !currentBuilding) {
          generatePoster();
        }
        return;
      }

      resizeCanvas(TICKET_W, TICKET_H);
      if (!ticketLayout || !ticketBuilding) {
        generateTicket();
      }
    }

    function updateModeControls() {
      const posterModeBtn = document.getElementById("posterModeBtn");
      const ticketModeBtn = document.getElementById("ticketModeBtn");
      const isPoster = activeMode === "poster";
      const isTicket = activeMode === "ticket";

      posterModeBtn.classList.toggle("is-active", isPoster);
      ticketModeBtn.classList.toggle("is-active", isTicket);
      posterModeBtn.setAttribute("aria-pressed", String(isPoster));
      ticketModeBtn.setAttribute("aria-pressed", String(isTicket));
      textUi.posterTextFields.hidden = !isPoster;
      textUi.ticketTextFields.hidden = !isTicket;
      document.body.dataset.format = activeMode;
      document.getElementById("generateBtn").setAttribute("aria-label", `shuffle ${activeMode}`);
    }

    function generateActiveFormat() {
      if (activeMode === "poster") {
        generatePoster();
        return;
      }

      generateTicket();
    }

    function saveActiveFormat() {
      if (activeMode === "poster") {
        saveCanvas("generated_poster", "png");
        return;
      }

      saveCanvas("generated_ticket", "png");
    }

    function syncPosterTextInputs() {
      textUi.titleInput.value = posterContent.title;
      textUi.subtitleInput.value = posterContent.subtitle;
      textUi.introInput.value = posterContent.textIntro;
      textUi.poemInput.value = posterContent.textPoem;
      textUi.dateInput.value = posterContent.dateAddress;
      textUi.extraInput.value = posterContent.extraInfo;
      textUi.extra2Input.value = posterContent.extraInfo2;
    }

    function syncTicketTextInputs() {
      textUi.ticketTitleInput.value = ticketContent.title;
      textUi.ticketDateInput.value = ticketContent.date;
      textUi.ticketTimeInput.value = ticketContent.time;
      textUi.ticketLocationInput.value = ticketContent.location;
      textUi.ticketNumberInput.value = ticketContent.number;
      textUi.ticketNoteInput.value = ticketContent.note;
    }

    function updatePosterContentFromInputs() {
      posterContent.title = textUi.titleInput.value;
      posterContent.subtitle = textUi.subtitleInput.value;
      posterContent.textIntro = textUi.introInput.value;
      posterContent.textPoem = textUi.poemInput.value;
      posterContent.dateAddress = textUi.dateInput.value;
      posterContent.extraInfo = textUi.extraInput.value;
      posterContent.extraInfo2 = textUi.extra2Input.value;
      refreshCurrentLayoutText();
    }

    function updateTicketContentFromInputs() {
      ticketContent.title = textUi.ticketTitleInput.value;
      ticketContent.date = textUi.ticketDateInput.value;
      ticketContent.time = textUi.ticketTimeInput.value;
      ticketContent.location = textUi.ticketLocationInput.value;
      ticketContent.number = textUi.ticketNumberInput.value;
      ticketContent.note = textUi.ticketNoteInput.value;
    }

    function refreshCurrentLayoutText() {
      if (!currentLayout) return;

      currentLayout.titleText = posterContent.title;
      currentLayout.subtitleText = posterContent.subtitle;

      if (currentLayout.textBlocks[0]) {
        currentLayout.textBlocks[0].text = posterContent.textIntro;
      }

      if (currentLayout.textBlocks[1]) {
        currentLayout.textBlocks[1].text = posterContent.textPoem;
      }

      if (currentLayout.date) {
        currentLayout.date.text = posterContent.dateAddress;
      }

      currentLayout.extras.forEach((block) => {
        if (block.contentKey === "extraInfo") {
          block.text = posterContent.extraInfo;
        }

        if (block.contentKey === "extraInfo2") {
          block.text = posterContent.extraInfo2;
        }
      });
    }

    function toggleTextPopover(event) {
      event.stopPropagation();
      const isOpen = textUi.textPopover.classList.toggle("is-open");
      textUi.textBtn.setAttribute("aria-expanded", String(isOpen));
    }

    function closeTextPopoverOnOutsideClick(event) {
      if (textUi.textPopover.contains(event.target) || textUi.textBtn.contains(event.target)) {
        return;
      }

      closeTextPopover();
    }

    function closeTextPopoverOnEscape(event) {
      if (event.key === "Escape") {
        closeTextPopover();
      }
    }

    function closeTextPopover() {
      textUi.textPopover.classList.remove("is-open");
      textUi.textBtn.setAttribute("aria-expanded", "false");
    }

    function draw() {
      if (activeMode === "poster") {
        drawPoster();
        return;
      }

      drawTicket();
    }

    async function loadBuildingList() {
      try {
        const response = await fetch("/api/buildings");

        if (!response.ok) {
          throw new Error("Could not load saved building list");
        }

        const items = await response.json();
        buildings = items
          .map(normalizeSavedItem)
          .filter((item) => {
            if (item.imageSource) {
              return true;
            }

            console.warn("Skipping saved item without an image source:", item);
            return false;
          });

        if (!buildings.length) {
          console.warn("No usable saved building images found. Using generated fallback artwork.");
          generatePosterFallback();
          return;
        }

        generatePoster();
      } catch (error) {
        console.error("Could not load buildings:", error);
        generatePosterFallback();
      }
    }

    function generatePoster() {
      if (!buildings.length) {
        console.warn("No usable saved building images found. Using generated fallback artwork.");
        generatePosterFallback();
        return;
      }

      const nextAssignment = computeNextPaletteAssignment();
      const buildingData = pick(buildings);
      const imageSource = getItemImageSource(buildingData);

      if (!imageSource) {
        console.warn("Saved item is missing an image source:", buildingData);
        generatePosterFallback();
        return;
      }

      loadImage(
        imageSource,
        (img) => {
          commitPaletteAssignment(nextAssignment);
          currentBuilding = img;
          currentLayout = createLayout();
        },
        (error) => {
          console.warn("Could not load saved image source. Using generated fallback artwork.", imageSource, error);
          generatePosterFallback();
        }
      );
    }

    function generatePost() {
      const nextAssignment = computeNextPaletteAssignment();

      postImageType = pick(["building", "street"]);
      const candidates = buildings.filter((item) => item.type === postImageType);
      const fallbackCandidates = buildings.filter((item) => item.type !== postImageType);
      const item = pick(candidates.length ? candidates : fallbackCandidates);
      const nextLayout = createPostLayout(postImageType);

      if (!item) {
        loadPostFallbackImage(postImageType, nextAssignment, nextLayout);
        return;
      }

      loadImage(
        getItemImageSource(item),
        (img) => {
          silhouetteCache = null;
          commitPaletteAssignment(nextAssignment);
          postLayout = nextLayout;
          updatePostCopyForLayout(postLayout);
          postImage = img;
        },
        (error) => {
          console.warn("Could not load saved image source for post. Using generated fallback artwork.", item, error);
          loadPostFallbackImage(postImageType, nextAssignment, nextLayout);
        }
      );
    }

    function loadPostFallbackImage(type, nextAssignment, nextLayout) {
      if (fallbackImageFiles.length) {
        const filename = pick(fallbackImageFiles);
        loadImage(
          `/fallback_images/${filename}`,
          (img) => {
            silhouetteCache = null;
            commitPaletteAssignment(nextAssignment);
            postLayout = nextLayout;
            updatePostCopyForLayout(postLayout);
            postImage = img;
          },
          (error) => {
            console.warn("Could not load fallback image, using drawn placeholder:", filename, error);
            silhouetteCache = null;
            commitPaletteAssignment(nextAssignment);
            postLayout = nextLayout;
            updatePostCopyForLayout(postLayout);
            postImage = createPostFallbackImage(type);
          }
        );
        return;
      }

      silhouetteCache = null;
      commitPaletteAssignment(nextAssignment);
      postLayout = nextLayout;
      updatePostCopyForLayout(postLayout);
      postImage = createPostFallbackImage(type);
    }

    function generateTicket() {
      if (!buildings.length) {
        console.warn("No usable saved building images found. Using generated fallback artwork.");
        generateTicketFallback();
        return;
      }

      const nextAssignment = computeNextPaletteAssignment();
      const buildingData = pick(buildings);
      const imageSource = getItemImageSource(buildingData);

      if (!imageSource) {
        console.warn("Saved item is missing an image source:", buildingData);
        generateTicketFallback();
        return;
      }

      loadImage(
        imageSource,
        (img) => {
          silhouetteCache = null;
          commitPaletteAssignment(nextAssignment);
          ticketBuilding = img;
          ticketBuildingIsFallback = false;
          ticketLayout = createTicketLayout();
          updateTicketCopyForLayout();
        },
        (error) => {
          console.warn("Could not load saved image source for ticket. Using generated fallback artwork.", imageSource, error);
          generateTicketFallback();
        }
      );
    }

      if (fallbackImageFiles.length) {

            ticketBuilding = createFallbackBuildingImage();
            ticketBuildingIsFallback = true;
            ticketLayout = createTicketLayout();

          }

      }

      silhouetteCache = null;
      commitPaletteAssignment(nextAssignment);
      ticketBuilding = createFallbackBuildingImage();
      ticketBuildingIsFallback = true;
      ticketLayout = createTicketLayout();
      updateTicketCopyForLayout();

    function createFallbackBuildingImage() {
      const pg = createGraphics(760, 420);
      pg.pixelDensity(1);
      pg.clear();
      pg.noStroke();

      const buildingCount = floor(random(4, 8));
      const streetY = pg.height - 36;
      let x = 20;

      for (let i = 0; i < buildingCount; i++) {
        const w = random(70, 130);
        const h = random(150, 330);
        const y = streetY - h;
        const hueStep = i % 3;
        const wallColor = hueStep === 0 ? "#1C1C1C" : hueStep === 1 ? "#4D5A63" : "#7B6D5E";

        pg.fill(wallColor);
        pg.rect(x, y, w, h);
        pg.fill("#F1EEE8");

        for (let wy = y + 26; wy < streetY - 42; wy += 34) {
          for (let wx = x + 14; wx < x + w - 20; wx += 28) {
            if (random() > 0.18) {
              pg.rect(wx, wy, 14, 18);
            }
          }
        }

        pg.fill("#F1EEE8");
        pg.rect(x + w * 0.38, streetY - 48, w * 0.24, 48);
        x += w + random(8, 22);
      }

      pg.fill("#1C1C1C");
      pg.rect(0, streetY, pg.width, 12);

      return pg;
    }

    function createPostFallbackImage(type) {
      return type === "street" ? createPostFallbackStreetImage() : createPostFallbackBuildingImage();
    }

    function createPostFallbackBuildingImage() {
      const pg = createGraphics(520, 680);
      pg.pixelDensity(1);
      pg.clear();
      pg.noStroke();

      const wall = pick(["#1C1C1C", "#4F5F6A", "#7B6D5E"]);
      pg.fill(wall);
      pg.rect(110, 120, 300, 470);
      pg.fill("#F1EEE8");

      for (let y = 166; y < 500; y += 58) {
        for (let x = 150; x < 360; x += 62) {
          if (random() > 0.14) {
            pg.rect(x, y, 30, 38);
          }
        }
      }

      pg.fill("#E7E0D3");
      pg.rect(224, 518, 68, 72);
      pg.fill("#1C1C1C");
      pg.rect(74, 590, 372, 18);

      return pg;
    }

    function createPostFallbackStreetImage() {
      const pg = createGraphics(980, 520);
      pg.pixelDensity(1);
      pg.clear();
      pg.noStroke();

      const groundY = 448;
      let x = 22;
      let index = 0;

      while (x < pg.width - 60) {
        const w = random(86, 154);
        const h = random(190, 390);
        const y = groundY - h;
        const wall = ["#1C1C1C", "#4F5F6A", "#7B6D5E", "#AFC6D8"][index % 4];

        pg.fill(wall);
        pg.rect(x, y, w, h);
        pg.fill("#F1EEE8");

        for (let wy = y + 30; wy < groundY - 48; wy += 42) {
          for (let wx = x + 18; wx < x + w - 24; wx += 36) {
            if (random() > 0.22) {
              pg.rect(wx, wy, 18, 24);
            }
          }
        }

        x += w + random(10, 26);
        index += 1;
      }

      pg.fill("#1C1C1C");
      pg.rect(0, groundY, pg.width, 18);

      return pg;
    }

      const paletteControls = document.getElementById("paletteControls");

      Object.entries(posterPaletteApi.colorPalettes).forEach(([paletteId, palette]) => {

    function createThemeButton(paletteId, palette) {
      const button = document.createElement("button");
      const swatch = document.createElement("span");
      const label = document.createElement("span");
      const themeLabel = THEME_LABELS[paletteId] || palette.name;

      button.className = "palette-button";
      button.type = "button";
      button.dataset.palette = paletteId;
      button.title = palette.name;
      button.setAttribute("aria-label", themeLabel);

      swatch.className = "palette-swatch";
      palette.colors.forEach((colorValue) => {
        const dot = document.createElement("span");
        dot.className = "palette-dot";
        dot.style.background = colorValue;
        swatch.appendChild(dot);
      });

      label.className = "palette-label";
      label.textContent = themeLabel;

      button.append(swatch, label);
      button.addEventListener("click", () => {
        activatePalette(paletteId);
      });

      return button;
    }

    function getPaletteAssignment(paletteId) {
      if (!paletteAssignments[paletteId]) {
        paletteAssignments[paletteId] = posterPaletteApi.createPaletteAssignment(paletteId);
      }

      return paletteAssignments[paletteId];
    }

    function activatePalette(paletteId) {
      if (paletteId === activePaletteId) {
        shuffleActivePaletteAssignment();
        return;
      }

      activePaletteId = paletteId;
      paletteAssignment = getPaletteAssignment(activePaletteId);
      updatePaletteButtons();
    }

    function resetCurrentPaletteAssignment() {
      paletteAssignment = createDifferentPaletteAssignment(activePaletteId, paletteAssignment);
      paletteAssignments[activePaletteId] = paletteAssignment;
    }

    // Computes a new palette assignment WITHOUT applying it yet, so the
    // background doesn't change until the new image is actually ready.
    function computeNextPaletteAssignment() {
      return createDifferentPaletteAssignment(activePaletteId, paletteAssignment);
    }

    // Applies a previously computed palette assignment. Call this at the
    // same moment the new building/layout is set, so background + content
    // change on the same frame.
    function commitPaletteAssignment(assignment) {
      paletteAssignment = assignment;
      paletteAssignments[activePaletteId] = assignment;
    }

    function shuffleActivePaletteAssignment() {
      paletteAssignment = createDifferentPaletteAssignment(activePaletteId, paletteAssignment);
      paletteAssignments[activePaletteId] = paletteAssignment;
      updatePaletteButtons();
    }

    function createDifferentPaletteAssignment(paletteId, previousAssignment) {
      let nextAssignment = posterPaletteApi.createPaletteAssignment(paletteId);
      const previousKey = previousAssignment ? getPaletteAssignmentKey(previousAssignment) : null;

      for (let tries = 0; previousKey && tries < 8; tries++) {
        if (getPaletteAssignmentKey(nextAssignment) !== previousKey) {
          return nextAssignment;
        }

        nextAssignment = posterPaletteApi.createPaletteAssignment(paletteId);
      }

      return nextAssignment;
    }

    function getPaletteAssignmentKey(assignment) {
      return [
        assignment.pageBackground,
        assignment.headline,
        assignment.bodyText,
        assignment.secondaryText,
        assignment.illustration,
        assignment.accent,
      ].join("|");
    }

    function updatePaletteButtons() {
      Array.from(document.querySelectorAll(".palette-button")).forEach((button) => {
        const isActive = button.dataset.palette === activePaletteId;
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
    }

    function drawPoster() {
      background(paletteAssignment.pageBackground);

      if (!currentLayout || !currentBuilding) {
        fill(paletteAssignment.text);
        noStroke();
        textSize(20);
        textAlign(LEFT, TOP);
        text("Save buildings first, then shuffle.", MARGIN_X, MARGIN_Y);
        return;
      }

      const imageRect = getImageFitRect(currentBuilding, currentLayout.image);
      const posterTextBlocks = avoidImageOverlap(
        [
          ...currentLayout.textBlocks,
          currentLayout.date,
          ...currentLayout.extras,
        ],
        imageRect
      );

      drawTitle(currentLayout.title, currentLayout.titleText);
      drawPosterSubtitle(currentLayout.title, currentLayout.titleText, currentLayout.subtitleText);
      drawImageBlock(currentBuilding, currentLayout.image);
      posterTextBlocks.forEach((block) => {
        if (block.kind === "light") {
          drawLightText(block);
        } else if (block.kind === "extra") {
          drawExtraText(block);
        } else {
          drawBodyText(block);
        }
      });

      // Uncomment for grid debug:
      // drawGrid();
    }

    function drawPost() {
      background(paletteAssignment.pageBackground);

      if (!postLayout || !postImage) {
        fill(paletteAssignment.text);
        noStroke();
        textSize(24);
        textAlign(LEFT, TOP);
        text("Loading archive fragments.", 92, 92);
        return;
      }

      const title = postContent.headline.trim() || (postLayout.variant === 4 ? "" : "Imaginary City Archive");
      const subtitle = postContent.subtitle.trim();
      const metadata = postContent.metadata.trim();
      const renderLayout = resolvePostDynamicLayout(postLayout, title);

      drawPostImageElement(postImage, renderLayout.imageRect, renderLayout.imageMode, renderLayout);

      if (renderLayout.solidPanel) {
        noStroke();
        fill(paletteAssignment.pageBackground);
        rect(renderLayout.solidPanel.x, renderLayout.solidPanel.y, renderLayout.solidPanel.w, renderLayout.solidPanel.h);
      }

      if (renderLayout.line) {
        stroke(paletteAssignment.accent);
        strokeWeight(2);
        line(renderLayout.line.x1, renderLayout.line.y1, renderLayout.line.x2, renderLayout.line.y2);
      }

      drawPostHeadline(title, renderLayout.headline, renderLayout);
      drawPostSupportingText(subtitle, renderLayout.subtitle, renderLayout.textOverImage ? "headline" : "bodyText", renderLayout);
      drawPostSupportingText(metadata, renderLayout.metadata, renderLayout.textOverImage ? "headline" : "secondaryText", renderLayout);
    }

    function createTicketLayout() {
      const mode = pick(["classic", "swapped", "bigCity", "bigTitle"]);
      const zones = createTicketModeZones(mode);
      const splitTitleAtSemicolon = random() < 0.55;
      const titleSize = random(zones.titleSize[0], zones.titleSize[1]);
      const titleLeading = random(0.78, 0.88);
      const titleLines = splitTitleAtSemicolon
        ? ["RE;", "ASSEMBLY;", "city generator"]
        : ["RE;ASSEMBLY;", "city generator"];
      const titleHeight = titleLines.length * titleSize * titleLeading;
      const titleY = zones.title.y + random(0, max(2, zones.title.h - titleHeight));
      const imageW = zones.image.w * random(zones.imageScale[0], zones.imageScale[1]);
      const imageH = zones.image.h * random(zones.imageHeight[0], zones.imageHeight[1]);
      const imageX = zones.image.x + (zones.image.w - imageW) / 2 + random(zones.imageJitterX[0], zones.imageJitterX[1]);
      const imageY = zones.image.y + (zones.image.h - imageH) / 2 + random(zones.imageJitterY[0], zones.imageJitterY[1]);
      const infoInsetX = random(22, 42);
      const infoY = TICKET_INFO_ZONE.y + random(44, 72);
      const infoAlign = random() < 0.82 ? LEFT : RIGHT;

      return {
        mode,
        title: {
          rect: {
            x: zones.title.x + random(0, zones.titleJitterX),
            y: titleY,
            w: zones.title.w - zones.titlePadRight,
            h: zones.title.h - (titleY - zones.title.y),
          },
          size: titleSize,
          leadingRatio: titleLeading,
          splitAtSemicolon: splitTitleAtSemicolon,
        },
        image: {
          x: constrain(imageX, zones.image.x, zones.image.x + zones.image.w - imageW),
          y: constrain(imageY, zones.image.y, zones.image.y + zones.image.h - imageH),
          w: imageW,
          h: imageH,
        },
        info: {
          x: TICKET_INFO_ZONE.x + infoInsetX,
          y: infoY,
          w: TICKET_INFO_ZONE.w - infoInsetX - 22,
          h: TICKET_INFO_ZONE.h - (infoY - TICKET_INFO_ZONE.y) - 36,
          align: infoAlign,
          leading: random(22, 26),
          bodySize: random(17, 19),
        },
        perforationX: TICKET_PERFORATION_X,
        microTop: {
          x: TICKET_MAIN_ZONE.x + random(0, 24),
          y: TICKET_MARGIN_Y - random(14, 22),
        },
        microBottom: {
          x: TICKET_MAIN_ZONE.x + random(0, 18),
          y: TICKET_MARGIN_Y + TICKET_WORK_H + random(8, 15),
        },
        serialTopPos: {
          x: TICKET_MAIN_ZONE.x + random(0, 18),
          y: TICKET_MARGIN_Y + TICKET_WORK_H - random(44, 66),
        },
        serialSideY: TICKET_MARGIN_Y + TICKET_WORK_H - random(0, 22),
        serialTop: `CTRF-${floor(random(10000, 99999))}-00038`,
        serialBottom: `UNBUILT-${floor(random(1000, 9999))}/MEMORY`,
      };
    }

    function createTicketModeZones(mode) {
      const mainTop = TICKET_MARGIN_Y + 16;
      const mainBottom = TICKET_MARGIN_Y + TICKET_WORK_H - 24;

      if (mode === "swapped") {
        return {
          title: {
            x: TICKET_IMAGE_ZONE.x + 10,
            y: mainTop + 18,
            w: TICKET_IMAGE_ZONE.w - 18,
            h: TICKET_WORK_H - 96,
          },
          image: {
            x: TICKET_TITLE_ZONE.x,
            y: mainTop + 12,
            w: TICKET_TITLE_ZONE.w,
            h: TICKET_WORK_H - 68,
          },
          titleSize: [58, 72],
          titleJitterX: 14,
          titlePadRight: 18,
          imageScale: [0.84, 0.98],
          imageHeight: [0.66, 0.88],
          imageJitterX: [-18, 18],
          imageJitterY: [-16, 22],
        };
      }

      if (mode === "bigCity") {
        return {
          title: {
            x: TICKET_MAIN_ZONE.x + 18,
            y: mainTop,
            w: TICKET_MAIN_ZONE.w * 0.48,
            h: TICKET_WORK_H * 0.32,
          },
          image: {
            x: TICKET_MAIN_ZONE.x,
            y: TICKET_MARGIN_Y + TICKET_WORK_H * 0.44,
            w: TICKET_MAIN_ZONE.w - 12,
            h: TICKET_WORK_H * 0.44,
          },
          titleSize: [40, 52],
          titleJitterX: 12,
          titlePadRight: 14,
          imageScale: [0.92, 1],
          imageHeight: [0.7, 1],
          imageJitterX: [-12, 12],
          imageJitterY: [-12, 10],
        };
      }

      if (mode === "bigTitle") {
        return {
          title: {
            x: TICKET_MAIN_ZONE.x,
            y: mainTop + 4,
            w: TICKET_MAIN_ZONE.w - 18,
            h: TICKET_WORK_H * 0.56,
          },
          image: {
            x: TICKET_MAIN_ZONE.x + TICKET_MAIN_ZONE.w * 0.48,
            y: mainBottom - TICKET_WORK_H * 0.24,
            w: TICKET_MAIN_ZONE.w * 0.48,
            h: TICKET_WORK_H * 0.22,
          },
          titleSize: [82, 106],
          titleJitterX: 16,
          titlePadRight: 24,
          imageScale: [0.74, 0.96],
          imageHeight: [0.72, 1],
          imageJitterX: [-18, 16],
          imageJitterY: [-8, 8],
        };
      }

      return {
        title: {
          x: TICKET_TITLE_ZONE.x,
          y: mainTop,
          w: TICKET_TITLE_ZONE.w,
          h: TICKET_WORK_H - 82,
        },
        image: {
          x: TICKET_IMAGE_ZONE.x,
          y: mainTop + 18,
          w: TICKET_IMAGE_ZONE.w,
          h: TICKET_WORK_H - 84,
        },
        titleSize: [62, 78],
        titleJitterX: 18,
        titlePadRight: 22,
        imageScale: [0.82, 0.98],
        imageHeight: [0.62, 0.82],
        imageJitterX: [-22, 22],
        imageJitterY: [-18, 24],
      };
    }

    function drawTicket() {
      background(paletteAssignment.pageBackground);

      if (!ticketLayout || !ticketBuilding) {
        fill(paletteAssignment.text);
        noStroke();
        textSize(20);
        textAlign(LEFT, TOP);
        text("Save buildings first, then shuffle.", TICKET_MARGIN_X, TICKET_MARGIN_Y);
        return;
      }

      drawTicketMicroText();
      drawTicketTitle(ticketLayout.title, ticketContent.title);
      drawTicketImageBlock(ticketBuilding, ticketLayout.image);
      drawTicketPerforation(ticketLayout.perforationX);
      drawTicketInfo(ticketLayout.info);
      drawTicketSerials();
    }

    function drawTicketTitle(block, title) {
      fill(paletteAssignment.headline);
      noStroke();

      const [mainTitle = "RE;ASSEMBLY;", ...subtitleParts] = title.trim().split(/\n+/);
      const subtitle = subtitleParts.join(" ").trim() || "city generator";
      const titleLines = block.splitAtSemicolon && mainTitle.toUpperCase() === "RE;ASSEMBLY;"
        ? ["RE;", "ASSEMBLY;"]
        : ticketTitleLines(mainTitle.toUpperCase(), block.rect.w, block.size || 78);
      const subtitleLines = ticketTitleLines(subtitle, block.rect.w, block.size || 78);
      const lines = [...titleLines, ...subtitleLines];
      const fontSize = fitTicketTitleLines(lines, block.rect, block.size || 78, block.leadingRatio || 0.86);
      const leading = fontSize * (block.leadingRatio || 0.86);

      textFont("Arial");
      textSize(fontSize);
      textLeading(leading);
      textStyle(BOLD);
      textAlign(LEFT, TOP);

      titleLines.forEach((line, index) => {
        text(line, block.rect.x, block.rect.y + index * leading);
      });

      textStyle(ITALIC);
      subtitleLines.forEach((line, index) => {
        text(line, block.rect.x, block.rect.y + (titleLines.length + index) * leading);
      });

      textStyle(NORMAL);
      textFont("Arial");
    }

    function drawTicketImageBlock(img, r) {
      if (!img) return;

      const imageRect = getImageFitRect(img, r);

      push();
      drawingContext.save();
      drawingContext.beginPath();
      drawingContext.rect(r.x, r.y, r.w, r.h);
      drawingContext.clip();

      if (ticketBuildingIsFallback || paletteAssignment.id === "monochrome") {
        const silhouette = getSilhouetteGraphic(img, paletteAssignment.illustration);
        image(silhouette, imageRect.x, imageRect.y, imageRect.w, imageRect.h);
      } else if (paletteAssignment.id !== "originalNeutral") {
        const tintColor = posterPaletteApi.hexToRgb(paletteAssignment.illustration);
        tint(tintColor[0], tintColor[1], tintColor[2]);
        image(img, imageRect.x, imageRect.y, imageRect.w, imageRect.h);
        noTint();
      } else {
        image(img, imageRect.x, imageRect.y, imageRect.w, imageRect.h);
      }

      drawingContext.restore();
      pop();
    }

    function drawTicketInfo(r) {
      if (!ticketQrImage) return;

      const qrSize = min(TICKET_INFO_ZONE.w, TICKET_INFO_ZONE.h) * 0.82;
      const qrX = TICKET_INFO_ZONE.x + (TICKET_INFO_ZONE.w - qrSize) / 2;
      const qrY = TICKET_INFO_ZONE.y + (TICKET_INFO_ZONE.h - qrSize) / 2;
      image(getTintedTicketQr(), qrX, qrY, qrSize, qrSize);
    }

    function getTintedTicketQr() {
      const qrColor = paletteAssignment.bodyText;
      if (ticketQrTintedImage && ticketQrTintColor === qrColor) {
        return ticketQrTintedImage;
      }

      const [red, green, blue] = posterPaletteApi.hexToRgb(qrColor);
      const tintedImage = ticketQrImage.get();
      tintedImage.loadPixels();

      for (let index = 0; index < tintedImage.pixels.length; index += 4) {
        const luminance = (
          tintedImage.pixels[index] * 0.299
          + tintedImage.pixels[index + 1] * 0.587
          + tintedImage.pixels[index + 2] * 0.114
        );
        const sourceAlpha = tintedImage.pixels[index + 3];
        tintedImage.pixels[index] = red;
        tintedImage.pixels[index + 1] = green;
        tintedImage.pixels[index + 2] = blue;
        tintedImage.pixels[index + 3] = sourceAlpha * (1 - luminance / 255);
      }

      tintedImage.updatePixels();
      ticketQrTintedImage = tintedImage;
      ticketQrTintColor = qrColor;
      return tintedImage;
    }

    function drawTicketPerforation(x) {
      const strokeColor = color(paletteAssignment.secondaryText);
      strokeColor.setAlpha(paletteAssignment.id === "monochrome" ? 210 : 132);

      stroke(strokeColor);
      strokeWeight(2);
      drawingContext.setLineDash([10, 14]);
      line(x, TICKET_MARGIN_Y, x, TICKET_MARGIN_Y + TICKET_WORK_H);
      drawingContext.setLineDash([]);
    }

    function drawTicketMicroText() {
      const textColor = color(paletteAssignment.secondaryText);
      textColor.setAlpha(paletteAssignment.id === "monochrome" ? 170 : 118);

      fill(textColor);
      noStroke();
      textFont("Arial");
      textStyle(NORMAL);
      textSize(9);
      textAlign(LEFT, TOP);
      text(ticketContent.note.toUpperCase(), ticketLayout.microTop.x, ticketLayout.microTop.y);
      text("THREE-ZONE TICKET FIELD / ARCHIVE INDEX 00038", ticketLayout.microBottom.x, ticketLayout.microBottom.y);
    }

    function drawTicketSerials() {
      const serialColor = color(paletteAssignment.accent);
      serialColor.setAlpha(paletteAssignment.id === "monochrome" ? 255 : 180);
      const topSerial = ticketContent.number.trim() || ticketLayout.serialTop;

      fill(serialColor);
      noStroke();
      textFont("Arial");
      textStyle(NORMAL);
      textSize(11);
      textAlign(LEFT, TOP);
      text(topSerial, ticketLayout.serialTopPos.x, ticketLayout.serialTopPos.y);

    }

    function fitTicketTitleLines(lines, r, preferredSize, leadingRatio) {
      for (let size = preferredSize; size >= 42; size -= 2) {
        textFont("Arial Black");
        textSize(size);
        const leading = size * leadingRatio;
        const textHeight = lines.length * leading;

        if (textHeight <= r.h && lines.every((line) => textWidth(line) <= r.w)) {
          return size;
        }
      }

      return 42;
    }

    function ticketTitleLines(textValue, maxWidth, size) {
      textFont("Arial Black");
      textSize(size);

      const words = textValue.split(/\s+/).filter(Boolean);
      const lines = [];
      let currentLine = "";

      words.forEach((word) => {
        const testLine = currentLine ? `${currentLine} ${word}` : word;

        if (textWidth(testLine) <= maxWidth || !currentLine) {
          currentLine = testLine;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      });

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines.length ? lines : ["IMAGINARY", "CITY", "ARCHIVE"];
    }

    function resolvePostDynamicLayout(layout, title) {
      const nextLayout = copyPostLayout(layout);

      if (nextLayout.variant !== 1) {
        return nextLayout;
      }

      const titleMetrics = measurePostTitleBlock(title, nextLayout.headline);
      const subtitleGap = 28;
      const subtitleY = min(
        titleMetrics.y + titleMetrics.height + subtitleGap,
        nextLayout.imageRect.y - nextLayout.subtitle.rect.h - 112
      );

      nextLayout.subtitle.rect.y = max(356, subtitleY);

      if (nextLayout.line) {
        nextLayout.line.y1 = nextLayout.subtitle.rect.y + nextLayout.subtitle.rect.h + 74;
        nextLayout.line.y2 = nextLayout.line.y1;
      }

      return nextLayout;
    }

    function copyPostLayout(layout) {
      return {
        ...layout,
        imageRect: { ...layout.imageRect },
        headline: copyPostTextSpec(layout.headline),
        subtitle: copyPostTextSpec(layout.subtitle),
        metadata: copyPostTextSpec(layout.metadata),
        line: layout.line ? { ...layout.line } : null,
        solidPanel: layout.solidPanel ? { ...layout.solidPanel } : null,
      };
    }

    function copyPostTextSpec(spec) {
      return {
        ...spec,
        rect: { ...spec.rect },
      };
    }

    function drawPostImageElement(img, target, mode, layout) {
      if (!img) return;

      const source = mode === "cover" ? getPostCoverSourceRect(img, target, layout) : null;
      drawPostStyledImage(img, target, source);
    }

    function drawPostStyledImage(img, target, source) {
      if (paletteAssignment.id === "monochrome") {
        const silhouette = getSilhouetteGraphic(img, paletteAssignment.illustration);
        drawPostImageWithOptionalSource(silhouette, target, source);
        return;
      }

      if (paletteAssignment.id !== "originalNeutral") {
        const tintColor = posterPaletteApi.hexToRgb(paletteAssignment.illustration);
        tint(tintColor[0], tintColor[1], tintColor[2], 220);
      }

      drawPostImageWithOptionalSource(img, target, source);

      if (paletteAssignment.id !== "originalNeutral") {
        noTint();
      }
    }

    function drawPostImageWithOptionalSource(img, target, source) {
      if (source) {
        image(img, target.x, target.y, target.w, target.h, source.sx, source.sy, source.sw, source.sh);
        return;
      }

      const fitted = getPostContainRect(img, target);
      image(img, fitted.x, fitted.y, fitted.w, fitted.h);
    }

    function getPostCoverSourceRect(img, target, layout) {
      const targetRatio = target.w / target.h;
      const imgRatio = img.width / img.height;
      let sw = img.width;
      let sh = img.height;

      if (imgRatio > targetRatio) {
        sw = img.height * targetRatio;
      } else {
        sh = img.width / targetRatio;
      }

      const maxX = max(0, img.width - sw);
      const maxY = max(0, img.height - sh);

      return {
        sx: maxX * layout.cropX,
        sy: maxY * layout.cropY,
        sw,
        sh,
      };
    }

    function getPostContainRect(img, target) {
      const scale = min(target.w / img.width, target.h / img.height);
      const w = img.width * scale;
      const h = img.height * scale;

      return {
        x: target.x + (target.w - w) / 2,
        y: target.y + (target.h - h) / 2,
        w,
        h,
      };
    }

    function drawPostHeadline(value, spec, layout) {
      if (!value) return;

      const r = spec.rect;
      const title = value.toUpperCase();
      const size = fitPostTextSize(title, r, spec.size, 52, 0.8);
      const leading = size * spec.leading;
      const lines = wrapPostTextLines(title, r.w, size, "Arial Black");

      if (layout.textOverImage && !layout.directText) {
        drawPostTextShadow(r.x, r.y, lines, size, leading, "Arial Black");
      }

      fill(paletteAssignment.headline);
      noStroke();
      textFont("Arial Black");
      textStyle(BOLD);
      textSize(size);
      textLeading(leading);
      textAlign(spec.alignX, spec.alignY);

      lines.forEach((line, index) => {
        text(line, r.x, r.y + index * leading);
      });

      textStyle(NORMAL);
      textFont("Arial");
    }

    function drawPostSupportingText(value, spec, colorRole, layout) {
      if (!value) return;

      const r = spec.rect;
      const textValue = spec.uppercase ? value.toUpperCase() : value;
      const colorValue = paletteAssignment[colorRole] || paletteAssignment.bodyText;

      if (layout.textOverImage && !layout.directText) {
        drawPostBodyTextShadow(textValue, spec);
      }

      fill(colorValue);
      noStroke();
      textFont("Arial");
      textStyle(NORMAL);
      textSize(spec.size);
      textLeading(spec.size * spec.leading);
      textAlign(spec.alignX, spec.alignY);
      text(textValue, r.x, r.y, r.w, r.h);
    }

    function measurePostTitleBlock(value, spec) {
      const title = value.toUpperCase();
      const size = fitPostTextSize(title, spec.rect, spec.size, 52, 0.8);
      const lines = wrapPostTextLines(title, spec.rect.w, size, "Arial Black");

      return {
        y: spec.rect.y,
        height: lines.length * size * spec.leading,
      };
    }

    function drawPostTextShadow(x, y, lines, size, leading, fontName) {
      push();
      textFont(fontName);
      textStyle(BOLD);
      textSize(size);
      textLeading(leading);
      textAlign(LEFT, TOP);
      const shadowColor = color(paletteAssignment.pageBackground);
      shadowColor.setAlpha(190);
      fill(shadowColor);
      noStroke();
      lines.forEach((line, index) => {
        text(line, x + 4, y + index * leading + 5);
      });
      pop();
    }

    function drawPostBodyTextShadow(value, spec) {
      push();
      textFont("Arial");
      textStyle(NORMAL);
      textSize(spec.size);
      textLeading(spec.size * spec.leading);
      textAlign(spec.alignX, spec.alignY);
      const shadowColor = color(paletteAssignment.pageBackground);
      shadowColor.setAlpha(180);
      fill(shadowColor);
      noStroke();
      text(value, spec.rect.x + 3, spec.rect.y + 4, spec.rect.w, spec.rect.h);
      pop();
    }

    function fitPostTextSize(textValue, r, preferredSize, minSize, leadingRatio) {
      for (let size = preferredSize; size >= minSize; size -= 2) {
        const lines = wrapPostTextLines(textValue, r.w, size, "Arial Black");
        const textHeight = lines.length * size * leadingRatio;

        if (textHeight <= r.h && lines.every((line) => textWidth(line) <= r.w)) {
          return size;
        }
      }

      return minSize;
    }

    function wrapPostTextLines(textValue, maxWidth, size, fontName) {
      textFont(fontName);
      textSize(size);

      const words = textValue.split(/\s+/).filter(Boolean);
      const lines = [];
      let currentLine = "";

      words.forEach((word) => {
        const testLine = currentLine ? `${currentLine} ${word}` : word;

        if (textWidth(testLine) <= maxWidth || !currentLine) {
          currentLine = testLine;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      });

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines;
    }

    function drawImageBlock(img, r) {
      if (!img) return;

      const imageRect = getImageFitRect(img, r);

      if (paletteAssignment.id === "monochrome") {
        const silhouette = getSilhouetteGraphic(img, paletteAssignment.illustration);

        image(
          silhouette,
          imageRect.x,
          imageRect.y,
          imageRect.w,
          imageRect.h
        );

        return;
      }

      if (paletteAssignment.id !== "originalNeutral") {
        const tintColor = posterPaletteApi.hexToRgb(paletteAssignment.illustration);
        push();
        tint(tintColor[0], tintColor[1], tintColor[2]);
      }

      image(
        img,
        imageRect.x,
        imageRect.y,
        imageRect.w,
        imageRect.h
      );

      if (paletteAssignment.id !== "originalNeutral") {
        pop();
      }
    }

    function getSilhouetteGraphic(img, silhouetteColor) {
      try {
        if (
          silhouetteCache &&
          silhouetteCacheSource === img &&
          silhouetteCacheColor === silhouetteColor
        ) {
          return silhouetteCache;
        }

        const [r, g, b] = posterPaletteApi.hexToRgb(silhouetteColor);
        const pg = createGraphics(img.width, img.height);

        pg.pixelDensity(1);
        pg.clear();
        pg.imageMode(CORNER);
        pg.image(img, 0, 0, img.width, img.height);
        pg.loadPixels();

        for (let i = 0; i < pg.pixels.length; i += 4) {
          const alpha = pg.pixels[i + 3];

          if (alpha > 8) {
            pg.pixels[i] = r;
            pg.pixels[i + 1] = g;
            pg.pixels[i + 2] = b;
            pg.pixels[i + 3] = 255;
          } else {
            pg.pixels[i + 3] = 0;
          }
        }

        pg.updatePixels();

        // Only remove the old cache AFTER the new one succeeds, and do it safely.
        if (silhouetteCache && silhouetteCache !== pg) {
          try {
            silhouetteCache.remove();
          } catch (removeError) {
            console.warn("Could not remove old silhouette cache (ignored):", removeError);
          }
        }

        silhouetteCache = pg;
        silhouetteCacheSource = img;
        silhouetteCacheColor = silhouetteColor;

        return silhouetteCache;
      } catch (error) {
        console.warn("Silhouette generation failed, falling back to plain image:", error);
        return img;
      }
    }

    function getImageFitRect(img, r) {
      const scale = min(r.w / img.width, r.h / img.height);
      const drawW = img.width * scale;
      const drawH = img.height * scale;
      const x = r.x + (r.w - drawW) / 2;
      const y = r.y + (r.h - drawH) / 2;

      return {
        x,
        y,
        w: drawW,
        h: drawH
      };
    }

    function drawTitle(block, title) {
      fill(paletteAssignment.headline);
      noStroke();

      const r = block.rect;
      const heading = getPosterHeadingMetrics(block, title, posterContent.subtitle);

      textFont("Arial");
      textSize(heading.size);
      textLeading(heading.titleLeading);
      textStyle(BOLD);
      textAlign(LEFT, TOP);

      heading.titleLines.forEach((line, index) => {
        text(line, r.x, r.y + index * heading.titleLeading);
      });

      textStyle(NORMAL);
      textFont("Arial");
    }

    function drawPosterSubtitle(block, title, subtitle) {
      const subtitleText = (subtitle || "").trim();
      if (!subtitleText) return;

      const r = block.rect;
      const heading = getPosterHeadingMetrics(block, title, subtitleText);
      const subtitleY = r.y + heading.titleLines.length * heading.titleLeading + heading.gap;

      fill(paletteAssignment.headline);
      noStroke();
      textFont("Arial");
      textSize(heading.size);
      textLeading(heading.subtitleLeading);
      textStyle(ITALIC);
      textAlign(LEFT, TOP);
      heading.subtitleLines.forEach((line, index) => {
        text(line, r.x, subtitleY + index * heading.subtitleLeading);
      });

      textStyle(NORMAL);
      textFont("Arial");
    }

    function getPosterHeadingMetrics(block, title, subtitle) {
      const r = block.rect;
      const titleText = (title || "").trim().toUpperCase();
      const subtitleText = (subtitle || "").trim();

      for (let size = block.size; size >= 42; size -= 2) {
        const titleLines = getPosterTitleLines(titleText, r.w, size, block.splitAtSemicolon);
        const subtitleLines = wrapHeadingLines(subtitleText, r.w, size, ITALIC);
        const titleLeading = size * 0.82;
        const subtitleLeading = size * 0.92;
        const gap = size * 0.06;
        const totalHeight = titleLines.length * titleLeading + gap + subtitleLines.length * subtitleLeading;
        const titleFits = headingLinesFit(titleLines, r.w, size, BOLD);
        const subtitleFits = headingLinesFit(subtitleLines, r.w, size, ITALIC);

        if (totalHeight <= r.h && titleFits && subtitleFits) {
          return { size, titleLines, subtitleLines, titleLeading, subtitleLeading, gap };
        }
      }

      const size = 42;
      return {
        size,
        titleLines: getPosterTitleLines(titleText, r.w, size, block.splitAtSemicolon),
        subtitleLines: wrapHeadingLines(subtitleText, r.w, size, ITALIC),
        titleLeading: size * 0.82,
        subtitleLeading: size * 0.92,
        gap: size * 0.06,
      };
    }

    function getPosterTitleLines(title, maxWidth, size, splitAtSemicolon) {
      if (splitAtSemicolon && title === "RE;ASSEMBLY;") {
        return ["RE;", "ASSEMBLY;"];
      }

      return wrapHeadingLines(title, maxWidth, size, BOLD);
    }

    function wrapHeadingLines(textValue, maxWidth, size, style) {
      textFont("Arial");
      textStyle(style);
      textSize(size);

      const words = textValue.split(/\s+/).filter(Boolean);
      const lines = [];
      let currentLine = "";

      words.forEach((word) => {
        const testLine = currentLine ? `${currentLine} ${word}` : word;
        if (textWidth(testLine) <= maxWidth || !currentLine) {
          currentLine = testLine;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      });

      if (currentLine) lines.push(currentLine);
      textStyle(NORMAL);
      return lines;
    }

    function headingLinesFit(lines, maxWidth, size, style) {
      textFont("Arial");
      textStyle(style);
      textSize(size);
      const fits = lines.every((line) => textWidth(line) <= maxWidth);
      textStyle(NORMAL);
      return fits;
    }

    function drawBodyText(block) {
      const r = block.rect;

      fill(paletteAssignment.bodyText);
      noStroke();

      textFont("Arial");
      textSize(block.size);
      textLeading(block.leading);
      textStyle(NORMAL);
      textAlign(LEFT, TOP);

      const paragraphText = block.text.replace(/\s+/g, " ").trim();
      text(paragraphText, r.x, r.y, r.w, r.h);
    }

    function drawLightText(block) {
      const r = block.rect;

      const textColor = color(paletteAssignment.secondaryText);
      textColor.setAlpha(paletteAssignment.id === "monochrome" ? 255 : 150);
      fill(textColor);
      noStroke();
      textFont("Arial");
      textSize(block.size);
      textLeading(block.leading);
      textStyle(NORMAL);
      textAlign(LEFT, TOP);

      text(block.text, r.x, r.y, r.w, r.h);
    }

    function drawExtraText(block) {
      const r = block.rect;

      fill(paletteAssignment.accent);
      noStroke();
      textFont("Arial");
      textSize(block.size);
      textLeading(block.leading);
      textStyle(NORMAL);
      textAlign(LEFT, TOP);

      text(block.text, r.x, r.y, r.w, r.h);
    }

    function fitTitleSize(title, r, preferredSize) {
      for (let size = preferredSize; size >= 52; size -= 2) {
        const lines = wrapTextLines(title, r.w, size);
        const leading = size * 0.82;
        const textHeight = lines.length * leading;

        if (textHeight <= r.h && lines.every((line) => textWidth(line) <= r.w)) {
          return size;
        }
      }

      return 52;
    }

    function wrapTextLines(textValue, maxWidth, size) {
      textFont("Arial Black");
      textSize(size);

      const words = textValue.split(" ");
      const lines = [];
      let currentLine = "";

      for (let word of words) {
        const testLine = currentLine ? `${currentLine} ${word}` : word;

        if (textWidth(testLine) <= maxWidth || !currentLine) {
          currentLine = testLine;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      }

      if (currentLine) {
        lines.push(currentLine);
      }

      return lines;
    }

    function titleBlock(col, row, colSpan, rowSpan, size) {
      return {
        rect: rectFromGrid(col, row, colSpan, rowSpan),
        size,
      };
    }

    function textBlock(col, row, colSpan, rowSpan, textValue, size, leading) {
      return {
        rect: rectFromGrid(col, row, colSpan, rowSpan),
        text: textValue,
        size,
        leading,
      };
    }

    function avoidImageOverlap(blocks, imageRect) {
      let nextY = imageRect.y + imageRect.h + TEXT_IMAGE_GAP;

      return blocks.map((block) => {
        const movedBlock = copyTextBlock(block);

        if (rectsOverlap(expandRect(movedBlock.rect, 10), imageRect)) {
          const maxY = MARGIN_Y + WORK_H - movedBlock.rect.h;
          movedBlock.rect.y = min(nextY, maxY);
          nextY = movedBlock.rect.y + movedBlock.rect.h + TEXT_IMAGE_GAP * 0.5;
        }

        return movedBlock;
      });
    }

    function copyTextBlock(block) {
      return {
        ...block,
        rect: { ...block.rect },
      };
    }

    function expandRect(r, amount) {
      return {
        x: r.x - amount,
        y: r.y - amount,
        w: r.w + amount * 2,
        h: r.h + amount * 2,
      };
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function optionalBlock(show, col, row, colSpan, rowSpan, textValue, size, leading) {
      if (!show) return null;
      const block = textBlock(col, row, colSpan, rowSpan, textValue, size, leading);
      block.contentKey = textValue === posterContent.extraInfo ? "extraInfo" : "extraInfo2";
      return block;
    }

    function postTextSpec(rectValue, size, leading, alignX, alignY, uppercase = false) {
      return {
        rect: rectValue,
        size,
        leading,
        alignX,
        alignY,
        uppercase,
      };
    }

    function postRect(x, y, w, h) {
      return { x, y, w, h };
    }

    function rectFromGrid(col, row, colSpan, rowSpan) {
      return {
        x: MARGIN_X + col * COL_W,
        y: MARGIN_Y + row * ROW_H,
        w: colSpan * COL_W,
        h: rowSpan * ROW_H
      };
    }

    function drawGrid() {
      stroke(255, 0, 0, 60);
      noFill();

      for (let c = 0; c <= COLS; c++) {
        const x = MARGIN_X + c * COL_W;
        line(x, MARGIN_Y, x, MARGIN_Y + WORK_H);
      }

      for (let r = 0; r <= ROWS; r++) {
        const y = MARGIN_Y + r * ROW_H;
        line(MARGIN_X, y, MARGIN_X + WORK_W, y);
      }
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
  </script>
  <script src="shared-nav.js"></script>
</body>
