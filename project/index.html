<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Almost Tomorrow City Generator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #e8e3dc;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: 280px;
    }

    .ui.is-collapsed {
      width: auto;
    }

    .ui-header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .title {
      color: #222;
      font-size: 13px;
      letter-spacing: 0.02em;
      opacity: 0.82;
    }

    .ui-content {
      max-height: calc(100vh - 88px);
      overflow-y: auto;
      padding: 16px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }

    .panel-toggle {
      appearance: none;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.78);
      color: #222;
      min-width: 34px;
      height: 36px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }

    .panel-toggle:hover {
      background: rgba(255,255,255,0.95);
    }

    .ui.is-collapsed .ui-header {
      margin-bottom: 0;
    }

    .ui.is-collapsed .title,
    .ui.is-collapsed .ui-content {
      display: none;
    }

    .control {
      margin-bottom: 12px;
    }

    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      color: #222;
      font-size: 12px;
      opacity: 0.82;
    }

    .control-hint {
      margin-top: 3px;
      color: #222;
      font-size: 10px;
      line-height: 1.3;
      opacity: 0.48;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #222;
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>
<body>
  <div class="ui is-collapsed">
    <div class="ui-header">
      <button class="panel-toggle" type="button" aria-label="expand controls" aria-expanded="false">⋮</button>
      <div class="title">sandbox</div>
    </div>

    <div class="ui-content">
      <div class="control">
        <div class="control-row">
          <span>warmth</span>
          <span id="warmthValue">0.50</span>
        </div>
        <input id="warmthSlider" type="range" min="0" max="1" step="0.01" value="0.50" />
        <div class="control-hint">cold to warm color</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>density</span>
          <span id="densityValue">0.50</span>
        </div>
        <input id="densitySlider" type="range" min="0" max="1" step="0.01" value="0.50" />
        <div class="control-hint">open to compact city</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>decoration</span>
          <span id="decorationValue">0.35</span>
        </div>
        <input id="decorationSlider" type="range" min="0" max="1" step="0.01" value="0.35" />
        <div class="control-hint">plain to detailed</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>glow</span>
          <span id="glowValue">0.45</span>
        </div>
        <input id="glowSlider" type="range" min="0" max="1" step="0.01" value="0.45" />
        <div class="control-hint">dark to lit windows</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>order</span>
          <span id="orderValue">0.45</span>
        </div>
        <input id="orderSlider" type="range" min="0" max="1" step="0.01" value="0.45" />
        <div class="control-hint">loose to regular grid</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>memory</span>
          <span id="memoryValue">0.45</span>
        </div>
        <input id="memorySlider" type="range" min="0" max="1" step="0.01" value="0.45" />
        <div class="control-hint">varied to repeated</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>tempo</span>
          <span id="tempoValue">0.30</span>
        </div>
        <input id="tempoSlider" type="range" min="0" max="1" step="0.01" value="0.30" />
        <div class="control-hint">slow to fast motion</div>
      </div>

      <div class="control">
        <div class="control-row">
          <span>layers</span>
          <span id="layersValue">3</span>
        </div>
        <input id="layersSlider" type="range" min="1" max="3" step="1" value="3" />
        <div class="control-hint">front only to full depth</div>
      </div>
    </div>
  </div>

  <script src="node_modules/p5/lib/p5.min.js"></script>
  <script src="sketch.js"></script>
  <script src="shared-nav.js"></script>
</body>
</html>
