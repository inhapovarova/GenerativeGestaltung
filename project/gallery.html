<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f4f1ea;
      color: #222;
      font-family: Arial, sans-serif;
    }

    body {
      box-sizing: border-box;
      padding: 86px 22px 34px;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .gallery-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    .gallery-count {
      font-size: 12px;
      opacity: 0.55;
    }

    .gallery-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .filter-button {
      appearance: none;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.36);
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      padding: 7px 12px;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .filter-button:hover,
    .filter-button.is-active {
      background: rgba(255, 255, 255, 0.72);
      border-color: rgba(0, 0, 0, 0.24);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }

    .building-card {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.42);
      text-decoration: none;
      transition: background 160ms ease, transform 160ms ease;
    }

    .building-card:hover {
      background: rgba(255, 255, 255, 0.72);
      transform: translateY(-2px);
    }

    .building-card img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 280px;
      object-fit: contain;
    }

    .empty-message,
    .error-message {
      margin-top: 26px;
      font-size: 13px;
      opacity: 0.62;
    }

    @media (max-width: 520px) {
      body {
        padding-inline: 14px;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
        gap: 10px;
      }

      .gallery-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
      }

      .building-card {
        min-height: 170px;
        padding: 10px;
        border-radius: 14px;
      }
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>
<body>
  <main>
    <header class="gallery-header">
      <h1>gallery</h1>
      <div class="gallery-count" id="galleryCount"></div>
    </header>

    <div class="gallery-controls" aria-label="gallery filters">
      <button class="filter-button is-active" type="button" data-filter="all">View All</button>
      <button class="filter-button" type="button" data-filter="building">Buildings</button>
      <button class="filter-button" type="button" data-filter="street">Streets</button>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="empty-message" id="emptyMessage" hidden>no saved buildings yet</div>
    <div class="error-message" id="errorMessage" hidden>could not load saved buildings</div>
  </main>

  <script>
    const galleryGrid = document.getElementById("galleryGrid");
    const galleryCount = document.getElementById("galleryCount");
    const emptyMessage = document.getElementById("emptyMessage");
    const errorMessage = document.getElementById("errorMessage");
    const filterButtons = Array.from(document.querySelectorAll(".filter-button"));

    let galleryItems = [];
    let activeFilter = "all";

    async function loadGallery() {
      try {
        const response = await fetch("/api/buildings");

        if (!response.ok) {
          throw new Error("Could not load buildings");
        }

        const items = await response.json();
        galleryItems = items.map(normalizeGalleryItem);

        renderGallery();
      } catch (error) {
        console.error(error);
        errorMessage.hidden = false;
      }
    }

    function renderGallery() {
      const visibleItems = getFilteredItems();

      galleryGrid.innerHTML = "";
      updateFilterButtons();
      updateCounts();

      emptyMessage.hidden = visibleItems.length > 0;
      emptyMessage.textContent = galleryItems.length
        ? `no saved ${activeFilter === "all" ? "items" : `${activeFilter}s`} yet`
        : "no saved items yet";

      visibleItems.forEach((item) => {
        if (!item.imageSource) {
          console.warn("Skipping gallery item without an image source:", item);
          return;
        }

        const card = document.createElement("a");
        card.className = "building-card";
        card.href = item.imageSource;
        card.target = "_blank";
        card.rel = "noopener";
        card.setAttribute("aria-label", `open ${item.filename}`);

        const image = document.createElement("img");
        image.src = item.imageSource;
        image.alt = item.filename;
        image.loading = "lazy";

        card.appendChild(image);
        galleryGrid.appendChild(card);
      });
    }

    function normalizeGalleryItem(item) {
      if (typeof item === "string") {
        return {
          filename: "saved item",
          imageSource: item,
          path: item,
          type: null,
        };
      }

      const imageSource = getItemImageSource(item);

      return {
        ...item,
        filename: item.filename || item.id || "saved item",
        imageSource,
        path: imageSource,
        type: item.type === "building" || item.type === "street" ? item.type : null,
      };
    }

    function getItemImageSource(item) {
      return item.imageData || item.imageUrl || item.src || item.path || null;
    }

    function getFilteredItems() {
      if (activeFilter === "all") {
        return galleryItems;
      }

      return galleryItems.filter((item) => item.type === activeFilter);
    }

    function updateCounts() {
      const totalCount = galleryItems.length;
      const buildingCount = galleryItems.filter((item) => item.type === "building").length;
      const streetCount = galleryItems.filter((item) => item.type === "street").length;

      galleryCount.textContent = `${totalCount} saved · ${buildingCount} buildings · ${streetCount} streets`;
    }

    function updateFilterButtons() {
      filterButtons.forEach((button) => {
        const isActive = button.dataset.filter === activeFilter;

        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        renderGallery();
      });
    });

    loadGallery();
  </script>
  <script src="shared-nav.js"></script>
</body>
</html>
