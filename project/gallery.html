<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f4f1ea;
      color: #222;
      font-family: Arial, sans-serif;
    }

    body {
      box-sizing: border-box;
      padding: 86px 22px 34px;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .gallery-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    .gallery-count {
      font-size: 12px;
      opacity: 0.55;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }

    .building-card {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.42);
      text-decoration: none;
      transition: background 160ms ease, transform 160ms ease;
    }

    .building-card:hover {
      background: rgba(255, 255, 255, 0.72);
      transform: translateY(-2px);
    }

    .building-card img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 280px;
      object-fit: contain;
    }

    .empty-message,
    .error-message {
      margin-top: 26px;
      font-size: 13px;
      opacity: 0.62;
    }

    @media (max-width: 520px) {
      body {
        padding-inline: 14px;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
        gap: 10px;
      }

      .building-card {
        min-height: 170px;
        padding: 10px;
        border-radius: 14px;
      }
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>
<body>
  <main>
    <header class="gallery-header">
      <h1>gallery</h1>
      <div class="gallery-count" id="galleryCount"></div>
    </header>

    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="empty-message" id="emptyMessage" hidden>no saved buildings yet</div>
    <div class="error-message" id="errorMessage" hidden>could not load saved buildings</div>
  </main>

  <script>
    const galleryGrid = document.getElementById("galleryGrid");
    const galleryCount = document.getElementById("galleryCount");
    const emptyMessage = document.getElementById("emptyMessage");
    const errorMessage = document.getElementById("errorMessage");

    async function loadGallery() {
      try {
        const response = await fetch("/api/buildings");

        if (!response.ok) {
          throw new Error("Could not load buildings");
        }

        const buildings = await response.json();

        if (!buildings.length) {
          emptyMessage.hidden = false;
          galleryCount.textContent = "";
          return;
        }

        galleryCount.textContent = `${buildings.length} saved`;

        buildings.forEach((building) => {
          const card = document.createElement("a");
          card.className = "building-card";
          card.href = building.path;
          card.target = "_blank";
          card.rel = "noopener";
          card.setAttribute("aria-label", `open ${building.filename}`);

          const image = document.createElement("img");
          image.src = building.path;
          image.alt = building.filename;
          image.loading = "lazy";

          card.appendChild(image);
          galleryGrid.appendChild(card);
        });
      } catch (error) {
        console.error(error);
        errorMessage.hidden = false;
      }
    }

    loadGallery();
  </script>
  <script src="shared-nav.js"></script>
</body>
</html>
