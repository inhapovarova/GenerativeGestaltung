<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Building / Street Generator</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f1ea;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .scene-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f4f1ea;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .scene-frame.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .format-toggle {
      position: fixed;
      top: 18px;
      right: 78px;
      z-index: 10000;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      height: 36px;
      padding: 3px;
      box-sizing: border-box;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      pointer-events: auto;
    }

    .format-toggle button {
      appearance: none;
      height: 28px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #222;
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
    }

    .format-toggle button:hover {
      background: rgba(255, 255, 255, 0.72);
    }

    .format-toggle button.is-active {
      background: #222;
      color: #fff;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.16);
    }

    @media (max-width: 640px) {
      .format-toggle {
        top: auto;
        bottom: max(12px, env(safe-area-inset-bottom));
        left: 12px;
        right: 12px;
        justify-content: stretch;
        height: 44px;
      }

      .format-toggle button {
        flex: 1 1 0;
        height: 36px;
        padding: 0 8px;
      }
    }
  </style>
  <link rel="stylesheet" href="shared-nav.css">
</head>
<body data-scene-mode="single">
  <iframe
    id="singleFrame"
    class="scene-frame is-active"
    title="Building Generator"
    src="single-building.html?embedded=1"
  ></iframe>

  <iframe
    id="streetFrame"
    class="scene-frame"
    title="Street Generator"
    src="random-street.html?embedded=1"
  ></iframe>

  <div class="format-toggle" id="formatToggle" aria-label="scene format">
    <button id="singleModeBtn" class="is-active" type="button" aria-pressed="true">Building</button>
    <button id="streetModeBtn" type="button" aria-pressed="false">Street</button>
  </div>

  <script>
    const sceneModes = {
      single: {
        button: document.getElementById("singleModeBtn"),
        frame: document.getElementById("singleFrame"),
      },
      street: {
        button: document.getElementById("streetModeBtn"),
        frame: document.getElementById("streetFrame"),
      },
    };

    let activeMode = new URLSearchParams(window.location.search).get("mode") === "street"
      ? "street"
      : "single";

    function activateSceneMode(mode, shouldUpdateUrl = true) {
      if (!sceneModes[mode]) return;
      activeMode = mode;

      Object.entries(sceneModes).forEach(([key, item]) => {
        const isActive = key === activeMode;
        item.button.classList.toggle("is-active", isActive);
        item.button.setAttribute("aria-pressed", String(isActive));
        item.frame.classList.toggle("is-active", isActive);
        item.frame.setAttribute("aria-hidden", String(!isActive));
      });

      document.body.dataset.sceneMode = activeMode;

      if (shouldUpdateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set("mode", activeMode);
        history.replaceState(null, "", url);
      }
    }

    sceneModes.single.button.addEventListener("click", () => activateSceneMode("single"));
    sceneModes.street.button.addEventListener("click", () => activateSceneMode("street"));
    activateSceneMode(activeMode, false);
  </script>
  <script src="shared-nav.js"></script>
</body>
</html>
